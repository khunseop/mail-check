<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Mail Check 설정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --border-hi: #cbd5e1;
      --text-1: #1e293b;
      --text-2: #64748b;
      --text-3: #94a3b8;
      --blue: #2563eb;
      --blue-bg: #eff6ff;
      --blue-border: #bfdbfe;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --red: #dc2626;
      --ui: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--ui);
      font-size: 13px;
      padding: 28px 32px;
      min-height: 100vh;
    }
    .page { max-width: 620px; margin: 0 auto; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .brand-icon  { font-size: 16px; color: var(--blue); }
    h1 {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2);
    }
    .btn-save-all {
      padding: 7px 18px; background: var(--blue); color: #fff;
      border: none; border-radius: 6px;
      font-family: var(--ui); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save-all:hover { background: #1d4ed8; }

    /* ── 정책 카드 ── */
    .policies { display: flex; flex-direction: column; gap: 8px; }

    .policy-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; box-shadow: 0 1px 2px #0000000a;
    }
    .policy-card.disabled { opacity: 0.5; }

    /* 헤더 한 줄 */
    .policy-header {
      display: flex; align-items: center; gap: 8px; padding: 9px 12px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .policy-num {
      font-family: var(--mono); font-size: 10px; color: var(--text-3);
      min-width: 20px; flex-shrink: 0;
    }
    .policy-name-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-1); font-family: var(--ui); font-size: 13px; font-weight: 500;
      min-width: 0;
    }
    .policy-name-input::placeholder { color: var(--text-3); }

    /* 활성화 토글 (레이블 포함) */
    .toggle-labeled {
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .toggle-labeled-text {
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--text-3); white-space: nowrap;
    }
    .toggle-labeled.is-on .toggle-labeled-text { color: var(--blue); }

    /* 토글 */
    .toggle-switch { position: relative; width: 32px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--border-hi); border-radius: 9px;
      transition: background 0.2s;
    }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
      background: #fff; border-radius: 50%; box-shadow: 0 1px 2px #0003;
      transition: transform 0.2s;
    }
    input:checked ~ .toggle-track { background: var(--blue); }
    input:checked ~ .toggle-track .toggle-thumb { transform: translateX(14px); }

    .btn-del-policy {
      background: none; border: none; color: var(--text-3); cursor: pointer;
      font-size: 16px; padding: 0 2px; line-height: 1; flex-shrink: 0;
      transition: color 0.15s;
    }
    .btn-del-policy:hover { color: var(--red); }

    /* 바디: 2열 키워드 */
    .policy-body {
      padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .kw-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    }
    .kw-col {
      padding: 8px 10px; display: flex; flex-direction: column; gap: 5px;
    }
    .kw-col:first-child { border-right: 1px solid var(--border); }
    .kw-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-2);
    }
    .add-row { display: flex; gap: 4px; }
    .kw-input {
      flex: 1; padding: 5px 8px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-1); font-family: var(--mono); font-size: 11px; outline: none;
      transition: border-color 0.15s; min-width: 0;
    }
    .kw-input:focus { border-color: var(--blue); }
    .btn-add-kw {
      padding: 5px 10px; background: var(--blue-bg); color: var(--blue);
      border: 1px solid var(--blue-border); border-radius: 4px;
      font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-add-kw:hover { background: #dbeafe; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 3px; min-height: 20px; }
    .tag {
      display: flex; align-items: center; gap: 3px; padding: 2px 7px;
      background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 3px;
      font-family: var(--mono); font-size: 10px; color: var(--blue);
    }
    .tag-remove {
      background: none; border: none; color: var(--blue); cursor: pointer;
      font-size: 12px; padding: 0; opacity: 0.5; line-height: 1;
    }
    .tag-remove:hover { opacity: 1; }
    .tag-empty { font-size: 11px; color: var(--text-3); }

    /* 동작 모드 선택 */
    .mode-section {
      display: flex; align-items: center; gap: 8px;
    }
    .mode-label {
      font-size: 10px; font-weight: 600; color: var(--text-3);
      letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    }
    .mode-selector {
      display: flex; border: 1px solid var(--border); border-radius: 5px;
      overflow: hidden; background: var(--surface2); flex: 1;
    }
    .mode-btn {
      flex: 1; padding: 5px 6px; font-size: 11px; font-family: var(--ui);
      font-weight: 500; border: none; background: transparent; cursor: pointer;
      color: var(--text-2); border-right: 1px solid var(--border);
      transition: background 0.15s, color 0.15s; white-space: nowrap;
    }
    .mode-btn:last-child { border-right: none; }
    .mode-btn.active { background: var(--blue); color: #fff; }
    .mode-btn:not(.active):hover { background: var(--blue-bg); color: var(--blue); }

    /* 모드별 하위 패널 */
    .mode-panel {
      display: flex; flex-direction: column; gap: 6px;
      padding: 8px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 5px;
    }

    /* 자동발신 행 (백엔드 패널 내부) */
    .action-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .action-label-wrap { display: flex; flex-direction: column; gap: 1px; }
    .action-label { font-size: 12px; font-weight: 500; color: var(--text-1); }
    .action-desc  { font-size: 10px; color: var(--text-3); }

    /* URL / 폴더 입력 행 */
    .url-row {
      display: flex; align-items: center; gap: 8px;
    }
    .url-row-label {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
    }
    .url-input {
      flex: 1; padding: 5px 8px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-1); font-family: var(--mono); font-size: 11px; outline: none;
      transition: border-color 0.15s;
    }
    .url-input:focus { border-color: var(--blue); }
    .match-hint { font-size: 10px; color: var(--text-3); }

    /* 정책 추가 버튼 */
    .btn-add-policy {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 9px; margin-top: 6px;
      background: var(--surface); border: 1px dashed var(--border-hi); border-radius: 8px;
      color: var(--text-2); font-family: var(--ui); font-size: 12px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .btn-add-policy:hover { color: var(--blue); border-color: var(--blue-border); background: var(--blue-bg); }

    .saved-msg {
      text-align: center; font-size: 12px; color: var(--blue);
      font-family: var(--mono); margin-top: 10px; opacity: 0; transition: opacity 0.3s;
    }
    .saved-msg.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="header-left">
        <span class="brand-icon">◈</span>
        <h1>감지 정책 관리</h1>
      </div>
      <button class="btn-save-all" id="btnSaveAll">저장</button>
    </header>

    <div class="policies" id="policyList"></div>
    <button class="btn-add-policy" id="btnAddPolicy">+ 정책 추가</button>
    <div class="saved-msg" id="savedMsg">✓ 저장되었습니다</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
