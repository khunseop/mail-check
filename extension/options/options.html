<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Mail Check 설정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --border-hi: #cbd5e1;
      --text-1: #1e293b;
      --text-2: #64748b;
      --text-3: #94a3b8;
      --blue: #2563eb;
      --blue-bg: #eff6ff;
      --blue-border: #bfdbfe;
      --red: #dc2626;
      --ui: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--ui);
      font-size: 14px;
      padding: 36px 40px;
      min-height: 100vh;
    }
    .page { max-width: 560px; margin: 0 auto; }

    /* 헤더 */
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .brand-icon { font-size: 18px; color: var(--blue); }
    h1 { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); }
    .btn-save-all {
      padding: 8px 20px; background: var(--blue); color: #fff;
      border: none; border-radius: 6px;
      font-family: var(--ui); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save-all:hover { background: #1d4ed8; }

    /* 정책 목록 */
    .policies { display: flex; flex-direction: column; gap: 10px; }

    /* 정책 카드 */
    .policy-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; box-shadow: 0 1px 3px #0000000a;
    }
    .policy-card.disabled { opacity: 0.5; }
    .policy-header {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px;
      border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    .policy-num {
      font-family: var(--mono); font-size: 10px; color: var(--text-3);
      min-width: 24px; text-align: center;
    }
    .policy-name-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-1); font-family: var(--ui); font-size: 14px; font-weight: 500;
    }
    .policy-name-input::placeholder { color: var(--text-3); }

    /* 토글 */
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--border-hi); border-radius: 10px;
      transition: background 0.2s;
    }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 14px; height: 14px;
      background: #fff; border-radius: 50%; box-shadow: 0 1px 3px #0003;
      transition: transform 0.2s;
    }
    input:checked ~ .toggle-track { background: var(--blue); }
    input:checked ~ .toggle-track .toggle-thumb { transform: translateX(16px); }

    .btn-del-policy {
      background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 18px;
      padding: 0 2px; line-height: 1; transition: color 0.15s;
    }
    .btn-del-policy:hover { color: var(--red); }

    /* 키워드 영역 */
    .policy-body { padding: 12px 14px; }
    .keyword-hint { font-size: 12px; color: var(--text-2); margin-bottom: 10px; }
    .add-row { display: flex; gap: 6px; }
    .kw-input {
      flex: 1; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text-1); font-family: var(--mono); font-size: 12px; outline: none;
      transition: border-color 0.15s;
    }
    .kw-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px #2563eb18; }
    .btn-add-kw {
      padding: 7px 14px; background: var(--blue-bg); color: var(--blue);
      border: 1px solid var(--blue-border); border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s;
    }
    .btn-add-kw:hover { background: #dbeafe; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .tag {
      display: flex; align-items: center; gap: 4px; padding: 3px 9px;
      background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 4px;
      font-family: var(--mono); font-size: 11px; color: var(--blue);
    }
    .tag-remove { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 14px; padding: 0; opacity: 0.5; }
    .tag-remove:hover { opacity: 1; }
    .tag-empty { font-size: 12px; color: var(--text-3); }

    /* 정책 추가 버튼 */
    .btn-add-policy {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 11px; margin-top: 6px;
      background: var(--surface); border: 1px dashed var(--border-hi); border-radius: 8px;
      color: var(--text-2); font-family: var(--ui); font-size: 13px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .btn-add-policy:hover { color: var(--blue); border-color: var(--blue-border); background: var(--blue-bg); }

    /* 저장 완료 메시지 */
    .saved-msg {
      text-align: center; font-size: 12px; color: var(--blue);
      font-family: var(--mono); margin-top: 12px; opacity: 0; transition: opacity 0.3s;
    }
    .saved-msg.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="header-left">
        <span class="brand-icon">◈</span>
        <h1>감지 정책 관리</h1>
      </div>
      <button class="btn-save-all" id="btnSaveAll">저장</button>
    </header>

    <div class="policies" id="policyList"></div>

    <button class="btn-add-policy" id="btnAddPolicy">+ 정책 추가</button>
    <div class="saved-msg" id="savedMsg">✓ 저장되었습니다</div>
  </div>

  <script>
    let policies = [];
    let nextId = 1;

    async function load() {
      const { policies: saved = [] } = await chrome.storage.local.get('policies');
      if (saved.length) {
        policies = saved.map(p => ({ ...p, keywords: [...(p.keywords || [])] }));
        nextId = Math.max(...policies.map(p => p.id), 0) + 1;
      } else {
        // 기본 정책 1개 생성
        policies = [{ id: nextId++, name: '정책 1', keywords: [], enabled: true }];
      }
      render();
    }

    function render() {
      const list = document.getElementById('policyList');
      list.innerHTML = '';
      policies.forEach((p, pi) => list.appendChild(buildCard(p, pi)));
    }

    function buildCard(policy, pi) {
      const card = document.createElement('div');
      card.className = 'policy-card' + (policy.enabled ? '' : ' disabled');
      card.dataset.id = policy.id;

      // 헤더
      const header = document.createElement('div');
      header.className = 'policy-header';

      const num = document.createElement('span');
      num.className = 'policy-num';
      num.textContent = '#' + (pi + 1);

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.className = 'policy-name-input';
      nameInput.value = policy.name;
      nameInput.placeholder = '정책 이름';
      nameInput.addEventListener('input', () => { policy.name = nameInput.value; });

      // 토글
      const toggleLabel = document.createElement('label');
      toggleLabel.className = 'toggle-switch';
      const toggleInput = document.createElement('input');
      toggleInput.type = 'checkbox';
      toggleInput.checked = policy.enabled;
      toggleInput.addEventListener('change', () => {
        policy.enabled = toggleInput.checked;
        card.classList.toggle('disabled', !policy.enabled);
      });
      const track = document.createElement('span');
      track.className = 'toggle-track';
      track.innerHTML = '<span class="toggle-thumb"></span>';
      toggleLabel.append(toggleInput, track);

      // 삭제 버튼
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del-policy';
      delBtn.textContent = '×';
      delBtn.title = '정책 삭제';
      delBtn.addEventListener('click', () => {
        if (policies.length === 1) return; // 마지막 정책은 삭제 불가
        policies.splice(policies.indexOf(policy), 1);
        render();
      });

      header.append(num, nameInput, toggleLabel, delBtn);

      // 바디 (키워드)
      const body = document.createElement('div');
      body.className = 'policy-body';

      const hint = document.createElement('p');
      hint.className = 'keyword-hint';
      hint.textContent = '메일 제목에 포함된 키워드 중 하나라도 일치하면 감지합니다.';

      const addRow = document.createElement('div');
      addRow.className = 'add-row';

      const kwInput = document.createElement('input');
      kwInput.type = 'text';
      kwInput.className = 'kw-input';
      kwInput.placeholder = '키워드 입력 후 추가 (Enter)';

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add-kw';
      addBtn.textContent = '추가';

      addRow.append(kwInput, addBtn);

      const tagList = document.createElement('div');
      tagList.className = 'tag-list';

      function renderTags() {
        tagList.innerHTML = '';
        if (!policy.keywords.length) {
          const empty = document.createElement('span');
          empty.className = 'tag-empty';
          empty.textContent = '키워드 없음';
          tagList.appendChild(empty);
          return;
        }
        policy.keywords.forEach((kw, ki) => {
          const tag = document.createElement('span');
          tag.className = 'tag';
          tag.textContent = kw;
          const rm = document.createElement('button');
          rm.className = 'tag-remove';
          rm.textContent = '×';
          rm.addEventListener('click', () => { policy.keywords.splice(ki, 1); renderTags(); });
          tag.appendChild(rm);
          tagList.appendChild(tag);
        });
      }

      function addKeyword() {
        const val = kwInput.value.trim();
        if (val && !policy.keywords.includes(val)) {
          policy.keywords.push(val);
          renderTags();
        }
        kwInput.value = '';
        kwInput.focus();
      }

      addBtn.addEventListener('click', addKeyword);
      kwInput.addEventListener('keydown', e => { if (e.key === 'Enter') addKeyword(); });

      renderTags();
      body.append(hint, addRow, tagList);
      card.append(header, body);
      return card;
    }

    document.getElementById('btnAddPolicy').addEventListener('click', () => {
      const num = policies.length + 1;
      policies.push({ id: nextId++, name: `정책 ${num}`, keywords: [], enabled: true });
      render();
    });

    document.getElementById('btnSaveAll').addEventListener('click', async () => {
      await chrome.storage.local.set({ policies });
      const msg = document.getElementById('savedMsg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);
    });

    load();
  </script>
</body>
</html>
